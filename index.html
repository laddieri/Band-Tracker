<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#1d4ed8">
  <title>Band Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <!-- Early connection to Firebase CDN and API hosts -->
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://securetoken.googleapis.com" crossorigin>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="app">
    <header id="app-header">
      <button id="back-btn" class="icon-btn hidden" aria-label="Go back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <img id="header-logo" src="" alt="" style="display:none">
      <h1 id="page-title">Band Tracker</h1>
      <span id="sync-indicator" class="hidden" title="Changes are saved on this device and will sync when you're back online.">Saving…</span>
      <div id="header-actions"></div>
    </header>

    <div id="ptr-indicator" aria-hidden="true"><div class="ptr-spinner"></div></div>

    <main id="main-content"></main>

    <nav id="bottom-nav">
      <button class="nav-tab" data-view="roster" onclick="navigate('roster')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>Roster</span>
      </button>
      <button class="nav-tab" data-view="rehearsals" onclick="navigate('rehearsals')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span>Rehearsals</span>
      </button>
      <button class="nav-tab" data-view="attendance-tab" onclick="navigate('attendance-tab')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
        <span>Attendance</span>
      </button>
      <button class="nav-tab" data-view="dashboard" onclick="navigate('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="9" rx="1"/>
          <rect x="14" y="3" width="7" height="5" rx="1"/>
          <rect x="14" y="12" width="7" height="9" rx="1"/>
          <rect x="3" y="16" width="7" height="5" rx="1"/>
        </svg>
        <span>Marks</span>
      </button>
      <button class="nav-tab" data-view="songs" onclick="navigate('songs')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
        <span>Songs</span>
      </button>
      <button class="nav-tab" data-view="leaderboard" onclick="navigate('leaderboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
          <polyline points="17 6 23 6 23 12"/>
        </svg>
        <span>Stats</span>
      </button>
      <button class="nav-tab" data-view="drill" onclick="navigate('drill')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="4" y1="22" x2="4" y2="3"/>
          <path d="M4 4h13l-2.5 3.5L17 11H4"/>
        </svg>
        <span>Drill</span>
      </button>
    </nav>
  </div>

  <div id="modal-overlay" class="hidden" onclick="handleModalClick(event)">
    <div id="modal-dialog" onclick="event.stopPropagation()">
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toast-container"></div>
  <div id="drill-chart-fs" class="hidden"></div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <!-- App scripts: plain scripts sharing global scope — order matters -->
  <script src="js/00-logic.js"></script>
  <script src="js/01-core.js"></script>
  <script src="js/02-data.js"></script>
  <script src="js/03-router.js"></script>
  <script src="js/04-render.js"></script>
  <script src="js/05-auth-views.js"></script>
  <script src="js/06-roster.js"></script>
  <script src="js/07-songs-portal.js"></script>
  <script src="js/08-stats.js"></script>
  <script src="js/09-rehearsal.js"></script>
  <script src="js/10-modals-settings.js"></script>
  <script src="js/11-reports.js"></script>
  <script src="js/12-drill.js"></script>
  <script src="js/13-boot.js"></script>
</body>
</html>
