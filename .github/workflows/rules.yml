name: Firestore Rules

# Tests the security rules against the emulator on every PR, and on merge to
# main re-tests then deploys them. Deploy only runs if the tests pass, so a
# rules change that breaks tenant isolation can never reach production.

on:
  pull_request:
    paths:
      - 'firestore.rules'
      - 'tests/**'
      - 'firebase.json'
      - 'package.json'
      - '.github/workflows/rules.yml'
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'tests/**'
      - 'firebase.json'
      - 'package.json'
      - '.github/workflows/rules.yml'

jobs:
  test:
    name: Test rules (emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: npm install
      - run: npm run test:rules

  deploy:
    name: Deploy rules
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Write service-account credentials
        run: printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/sa.json"
      - name: Deploy firestore rules
        run: npx firebase-tools deploy --only firestore:rules --project band-tracker-ae9b4 --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
